name: Update Citations (manual)

# Google Scholar blocks requests from GitHub Actions (Azure cloud IPs).
# Run update_citations.py locally instead — same approach as Christian Rauh's
# rvest-based build at https://github.com/ChRauh/ChRauh.github.io
#
# This workflow is kept as a manual fallback (workflow_dispatch only).
on:
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 matplotlib

      - name: Fetch citation stats and generate plot
        run: python3 update_citations.py

      - name: Commit updated data and plot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.json code/citations/czymara_scholar_citations.png
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update citations and plot [skip ci]" && git push)
