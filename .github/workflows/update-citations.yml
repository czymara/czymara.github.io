name: Update Citations

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install dependencies
        run: |
          install.packages(c("scholar", "ggplot2", "ggtext"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Generate citation plot
        working-directory: code/citations
        run: Rscript citations_plot.R

      - name: Commit updated plot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add code/citations/czymara_scholar_citations.png
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update citations plot [skip ci]" && git push)
