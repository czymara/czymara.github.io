name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch Google Scholar stats
        run: |
          python3 - <<'PYEOF'
          import json, sys
          from datetime import date
          from scholarly import scholarly

          SCHOLAR_ID = "khPqHmgAAAAJ"

          try:
              author = scholarly.search_author_id(SCHOLAR_ID)
              author = scholarly.fill(author, sections=["basics", "indices"])
              data = {
                  "citations": author.get("citedby", 0),
                  "h_index":   author.get("hindex", 0),
                  "i10_index": author.get("i10index", 0),
                  "updated":   str(date.today()),
              }
              with open("_data/scholar.json", "w") as f:
                  json.dump(data, f, indent=2)
              print("Success:", data)
          except Exception as e:
              print("Could not fetch Scholar data:", e)
              sys.exit(1)
          PYEOF

      - name: Commit updated citation data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update Google Scholar citation stats [skip ci]" && git push)
