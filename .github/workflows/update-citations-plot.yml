name: Update Citations Plot (Python)

on:
  schedule:
    # Runs daily at 08:00 UTC (one hour after the R version)
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update-citations-plot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 matplotlib

      - name: Generate citation plot
        working-directory: code/citations
        run: python citations_plot.py

      - name: Commit updated plot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add code/citations/czymara_scholar_citations.png
          git diff --staged --quiet && echo "No changes" || \
            (git pull --rebase origin master && git commit -m "chore: update citations plot (Python) [skip ci]" && git push)
