name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch citation stats from OpenAlex
        run: |
          python3 - <<'PYEOF'
          import json, sys, urllib.request, urllib.parse
          from datetime import date

          EMAIL       = "czymara@gmail.com"
          AUTHOR_NAME = "Christian Czymara"
          BASE_URL    = "https://api.openalex.org"
          HEADERS     = {"User-Agent": f"czymara-website/1.0 (mailto:{EMAIL})"}

          try:
              params = urllib.parse.urlencode({
                  "search": AUTHOR_NAME,
                  "select": "id,display_name,cited_by_count,summary_stats",
                  "mailto": EMAIL,
              })
              req = urllib.request.Request(f"{BASE_URL}/authors?{params}", headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as r:
                  results = json.loads(r.read())["results"]

              author  = results[0]
              total   = author["cited_by_count"]
              h_index = author["summary_stats"]["h_index"]
              i10     = author["summary_stats"].get("i10_index", 0)

              data = {
                  "citations": total,
                  "h_index":   h_index,
                  "i10_index": i10,
                  "updated":   str(date.today()),
              }
              with open("_data/scholar.json", "w") as f:
                  json.dump(data, f, indent=2)
              print("Stats saved:", data)

          except Exception as e:
              print("Error:", e)
              sys.exit(1)
          PYEOF

      - name: Commit updated citation data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar.json
          git diff --staged --quiet && echo "No changes" || \
            (git commit -m "chore: update citation stats [skip ci]" && git push)
